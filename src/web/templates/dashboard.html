<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reposcape Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <a href="/">Reposcape</a>
        <div class="spacer"></div>
        <button id="rerun" type="button">Re-run</button>
      </header>

      <section>
        <h2 id="repoTitle">Loading…</h2>
        <div id="status" class="status">Starting analysis…</div>
      </section>

      <section class="card">
        <h3>Treemap (LOC by file)</h3>
        <div id="treemap"></div>
      </section>

      <section class="card">
        <h3>Languages</h3>
        <pre id="languages" class="mono"></pre>
      </section>

      <section class="card">
        <h3>Top Contributors</h3>
        <div id="contributors"></div>
      </section>

      <section class="card">
        <h3>Commit Quality</h3>
        <div id="commitQuality"></div>
      </section>
    </main>

    <script>
      function getRepoUrl() {
        const url = new URL(window.location.href);
        const repo = url.searchParams.get('repo');
        return repo || 'https://github.com/gunnargray-dev/reposcape';
      }

      function el(id) {
        return document.getElementById(id);
      }

      function safeJson(obj) {
        return JSON.stringify(obj || null, null, 2);
      }

      function renderContributors(contrib) {
        const container = el('contributors');
        container.innerHTML = '';

        if (!contrib || !Array.isArray(contrib.authors)) {
          container.textContent = 'No contributor data available.';
          return;
        }

        const top = contrib.authors.slice(0, 10);
        const table = document.createElement('table');
        table.className = 'table';

        const thead = document.createElement('thead');
        thead.innerHTML = '<tr><th>Author</th><th>Commits</th><th>Insertions</th><th>Deletions</th></tr>';
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        for (const a of top) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td class="mono">${a.author}</td><td>${a.commits}</td><td>${a.insertions}</td><td>${a.deletions}</td>`;
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        container.appendChild(table);
      }

      function renderCommitQuality(q) {
        const container = el('commitQuality');
        container.innerHTML = '';

        if (!q) {
          container.textContent = 'No commit quality data available.';
          return;
        }

        const summary = document.createElement('div');
        summary.className = 'grid';

        const avg = q.average_score != null ? q.average_score.toFixed(1) : 'n/a';
        const grade = q.average_grade || 'n/a';

        summary.innerHTML = `
          <div class="kpi"><div class="kpiLabel">Avg score</div><div class="kpiValue">${avg}</div></div>
          <div class="kpi"><div class="kpiLabel">Avg grade</div><div class="kpiValue">${grade}</div></div>
        `;
        container.appendChild(summary);

        const dist = document.createElement('pre');
        dist.className = 'mono';
        dist.textContent = safeJson(q.grade_distribution);
        container.appendChild(dist);
      }

      async function run() {
        const repoUrl = getRepoUrl();
        el('repoTitle').textContent = repoUrl;
        el('status').textContent = 'Analyzing…';

        const resp = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ repo_url: repoUrl })
        });

        if (!resp.ok) {
          const err = await resp.json();
          el('status').textContent = 'Error: ' + (err.detail || 'unknown');
          return;
        }

        const data = await resp.json();
        el('status').textContent = data.cached ? 'Done (cached)' : 'Done';

        el('languages').textContent = safeJson(data.languages);
        renderTreemap(data.treemap);
        renderContributors(data.contributors);
        renderCommitQuality(data.commit_quality);
      }

      function renderTreemap(treeData) {
        const container = el('treemap');
        container.innerHTML = '';

        if (!treeData) {
          container.textContent = 'No treemap data available.';
          return;
        }

        const width = Math.min(960, container.clientWidth || 960);
        const height = 520;

        const root = d3.hierarchy(treeData)
          .sum(d => d.value || 0)
          .sort((a,b) => (b.value||0) - (a.value||0));

        d3.treemap()
          .size([width, height])
          .padding(2)(root);

        const svg = d3.select(container).append('svg')
          .attr('width', width)
          .attr('height', height)
          .attr('viewBox', `0 0 ${width} ${height}`);

        const nodes = svg.selectAll('g')
          .data(root.leaves())
          .enter().append('g')
          .attr('transform', d => `translate(${d.x0},${d.y0})`);

        nodes.append('rect')
          .attr('width', d => d.x1 - d.x0)
          .attr('height', d => d.y1 - d.y0)
          .attr('fill', '#2E90FA')
          .attr('fill-opacity', 0.25)
          .attr('stroke', '#2E90FA');

        nodes.append('title')
          .text(d => `${d.data.name}\n${d.value} LOC`);

        nodes.append('text')
          .attr('x', 4)
          .attr('y', 14)
          .attr('font-size', '12px')
          .attr('fill', '#0B1220')
          .text(d => d.data.name)
          .each(function(d) {
            const rectWidth = d.x1 - d.x0;
            const self = d3.select(this);
            if (self.node().getComputedTextLength() > rectWidth - 6) {
              const name = d.data.name;
              self.text(name.length > 16 ? name.slice(0, 15) + '…' : name);
            }
          });
      }

      el('rerun').addEventListener('click', run);
      run();
    </script>
  </body>
</html>
